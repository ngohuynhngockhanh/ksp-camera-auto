# ksp-camera-auto configuration.
# Copy to config.yaml and adjust. All fields have safe defaults.

server:
  # Address the web UI listens on.
  addr: ":2028"
  # Login for the web UI.
  username: "admin"
  password: "smarthome12345"
  # Optional: bcrypt hash checked instead of `password` (generate with
  # `kspcam --hash-password <pw>`). Leave empty to use plaintext `password`.
  password_hash: ""
  # Failed-login protection: an IP is locked out after this many consecutive
  # wrong-password attempts, for this many minutes (reset on every further
  # failed attempt while still locked).
  login_max_attempts: 5
  login_lockout_minutes: 30

# Where the camera inventory is persisted (managed from the web UI).
cameras_file: "cameras.yaml"

# Default per-vendor config ports used when a camera entry omits its port.
defaults:
  hikvision_port: 8000   # Hikvision private/SDK port
  dahua_port: 37777      # Dahua/KBVision DHIP port (37777, sometimes 8888)
  # Default camera credentials to try when an entry omits them.
  username: "admin"
  password: "smarthome12345"
  # Per-device operation timeout in seconds (higher helps slow multi-channel
  # NVRs; the web UI can override it per request).
  timeout_seconds: 30
  # Default new password when bulk-changing a camera's password.
  new_password: "smarthome12345"

# Camera passwords are stored AES-encrypted in cameras.yaml. The key lives at
# ~/.kspcam.key (auto-generated, 0600) or KSPCAM_KEY / KSPCAM_KEY_FILE env.
