<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ksp-camera-auto — Đăng nhập</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: #0f172a; color: #e2e8f0;
  }
  .card {
    width: min(92vw, 360px); background: #1e293b; border: 1px solid #334155;
    border-radius: 14px; padding: 28px 26px; box-shadow: 0 10px 40px rgba(0,0,0,.4);
  }
  h1 { font-size: 1.15rem; margin: 0 0 4px; }
  p.sub { margin: 0 0 20px; color: #94a3b8; font-size: .85rem; }
  label { display: block; font-size: .8rem; color: #cbd5e1; margin: 14px 0 6px; }
  input {
    width: 100%; padding: 11px 12px; border-radius: 9px; border: 1px solid #475569;
    background: #0f172a; color: #e2e8f0; font-size: .95rem;
  }
  input:focus { outline: 2px solid #38bdf8; border-color: transparent; }
  button {
    margin-top: 22px; width: 100%; padding: 12px; border: 0; border-radius: 9px;
    background: #38bdf8; color: #0f172a; font-weight: 600; font-size: .95rem; cursor: pointer;
  }
  button:hover { background: #0ea5e9; }
  .err { margin-top: 14px; color: #fca5a5; font-size: .82rem; display: none; }
  .err.show { display: block; }
</style>
</head>
<body>
  <form class="card" method="post" action="/login">
    <h1>ksp-camera-auto</h1>
    <p class="sub">Chỉnh cấu hình camera hàng loạt · Hikvision &amp; Dahua/KBVision</p>
    <label for="username">Tài khoản</label>
    <input id="username" name="username" autocomplete="username" autofocus required>
    <label for="password">Mật khẩu</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
    <button type="submit">Đăng nhập</button>
    <div class="err" id="err">Sai tài khoản hoặc mật khẩu.</div>
  </form>
  <script>
    if (new URLSearchParams(location.search).get('err')) {
      document.getElementById('err').classList.add('show');
    }
  </script>
</body>
</html>
