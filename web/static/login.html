<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ksp-camera-auto — Đăng nhập</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2338bdf8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='3' y='6' width='12' height='12' rx='2'/%3E%3Cpath d='M15 10l6-3v10l-6-3'/%3E%3C/svg%3E">
<script>
  (function () {
    var t = localStorage.getItem('kspcam-theme');
    if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<style>
  :root {
    color-scheme: dark;
    --bg: #0f172a; --surface: #1e293b; --border: #334155;
    --text: #f1f5f9; --text-2: #cbd5e1; --muted: #94a3b8;
    --accent: #38bdf8; --accent-strong: #0ea5e9; --on-accent: #0c1524;
    --danger: #f87171;
  }
  @media (prefers-color-scheme: light) {
    :root {
      color-scheme: light;
      --bg: #f1f5f9; --surface: #ffffff; --border: #e2e8f0;
      --text: #0f172a; --text-2: #334155; --muted: #64748b;
      --accent: #0284c7; --accent-strong: #0369a1; --on-accent: #ffffff;
      --danger: #dc2626;
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --bg: #0f172a; --surface: #1e293b; --border: #334155;
    --text: #f1f5f9; --text-2: #cbd5e1; --muted: #94a3b8;
    --accent: #38bdf8; --accent-strong: #0ea5e9; --on-accent: #0c1524;
    --danger: #f87171;
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg: #f1f5f9; --surface: #ffffff; --border: #e2e8f0;
    --text: #0f172a; --text-2: #334155; --muted: #64748b;
    --accent: #0284c7; --accent-strong: #0369a1; --on-accent: #ffffff;
    --danger: #dc2626;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg); color: var(--text); padding: 16px;
  }
  .theme-toggle {
    position: fixed; top: max(12px, env(safe-area-inset-top)); right: 12px;
    width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-2); cursor: pointer; display: grid; place-items: center;
  }
  .theme-toggle:hover { color: var(--text); }
  .theme-toggle svg { width: 18px; height: 18px; }
  .theme-toggle .icon-sun { display: none; }
  @media (prefers-color-scheme: light) {
    .theme-toggle .icon-sun { display: inline; }
    .theme-toggle .icon-moon { display: none; }
    :root[data-theme="dark"] .theme-toggle .icon-sun { display: none; }
    :root[data-theme="dark"] .theme-toggle .icon-moon { display: inline; }
  }
  :root[data-theme="light"] .theme-toggle .icon-sun { display: inline; }
  :root[data-theme="light"] .theme-toggle .icon-moon { display: none; }

  .card {
    width: min(92vw, 360px); background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 28px 26px; box-shadow: 0 10px 40px rgba(0, 0, 0, .4);
  }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .brand svg { color: var(--accent); flex: none; }
  h1 { font-size: 1.15rem; margin: 0; }
  p.sub { margin: 8px 0 20px; color: var(--muted); font-size: .85rem; }
  label { display: block; font-size: .8rem; color: var(--text-2); margin: 14px 0 6px; }
  input {
    width: 100%; padding: 11px 12px; border-radius: 9px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 16px; font-family: inherit;
  }
  input:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }
  button[type=submit] {
    margin-top: 22px; width: 100%; padding: 12px; border: 0; border-radius: 9px; min-height: 44px;
    background: var(--accent); color: var(--on-accent); font-weight: 600; font-size: .95rem; cursor: pointer;
  }
  button[type=submit]:hover { background: var(--accent-strong); }
  .err { margin-top: 14px; color: var(--danger); font-size: .82rem; display: none; }
  .err.show { display: block; }
</style>
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Đổi giao diện sáng/tối">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
  </button>
  <form class="card" method="post" action="/login">
    <div class="brand">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="12" height="12" rx="2"/><path d="M15 10l6-3v10l-6-3"/></svg>
      <h1>ksp-camera-auto</h1>
    </div>
    <p class="sub">Chỉnh cấu hình camera hàng loạt · Hikvision &amp; Dahua/KBVision</p>
    <label for="username">Tài khoản</label>
    <input id="username" name="username" autocomplete="username" autofocus required>
    <label for="password">Mật khẩu</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
    <button type="submit">Đăng nhập</button>
    <div class="err" id="err">Sai tài khoản hoặc mật khẩu.</div>
  </form>
  <script>
    if (new URLSearchParams(location.search).get('err')) {
      document.getElementById('err').classList.add('show');
    }
    document.getElementById('theme-toggle').addEventListener('click', function () {
      var attr = document.documentElement.getAttribute('data-theme');
      var current = attr || (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('kspcam-theme', next);
    });
  </script>
</body>
</html>
