<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ksp-camera-auto</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: #0f172a; color: #e2e8f0;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 22px; background: #1e293b; border-bottom: 1px solid #334155;
  }
  header h1 { font-size: 1rem; margin: 0; }
  header a { color: #94a3b8; font-size: .85rem; text-decoration: none; }
  header a:hover { color: #e2e8f0; }
  main { padding: 26px 22px; max-width: 960px; margin: 0 auto; }
  .panel {
    background: #1e293b; border: 1px solid #334155; border-radius: 12px;
    padding: 22px; margin-bottom: 18px;
  }
  .panel h2 { margin: 0 0 10px; font-size: .95rem; }
  .muted { color: #94a3b8; font-size: .85rem; }
  code { background: #0f172a; padding: 1px 6px; border-radius: 5px; }
</style>
</head>
<body>
  <header>
    <h1>ksp-camera-auto</h1>
    <a href="/logout">Đăng xuất</a>
  </header>
  <main>
    <div class="panel">
      <h2>Bảng điều khiển</h2>
      <p class="muted">
        Khung giao diện đã sẵn sàng. Các mục Kho camera, Quét mạng và Chỉnh cấu hình
        hàng loạt sẽ được lắp vào ở các mốc tiếp theo (M4/M5).
      </p>
      <p class="muted">Máy chủ chạy tại <code>:2028</code>.</p>
    </div>
  </main>
</body>
</html>
